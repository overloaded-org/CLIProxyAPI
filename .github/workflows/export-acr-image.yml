name: Export ACR Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: ACR image tag to export
        required: true

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Export amd64 image
        env:
          IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/cli-proxy-api:${{ inputs.version }}-amd64
        run: |
          set -euo pipefail
          docker pull "${IMAGE}"
          docker save "${IMAGE}" | gzip -9 > cli-proxy-api-linux-amd64.tar.gz
          sha256sum cli-proxy-api-linux-amd64.tar.gz > cli-proxy-api-linux-amd64.tar.gz.sha256
      - name: Upload image archive
        uses: actions/upload-artifact@v4
        with:
          name: cli-proxy-api-linux-amd64
          path: |
            cli-proxy-api-linux-amd64.tar.gz
            cli-proxy-api-linux-amd64.tar.gz.sha256
          retention-days: 1
