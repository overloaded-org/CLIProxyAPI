name: Mirror ACR Image To GHCR

on:
  workflow_dispatch:
    inputs:
      version:
        description: ACR image tag to mirror
        required: true

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Mirror multi-arch image
        env:
          SOURCE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/cli-proxy-api
          TARGET: ghcr.io/overloaded-org/cliproxyapi
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create --tag "${TARGET}:latest" "${SOURCE}:latest"
          docker buildx imagetools create --tag "${TARGET}:${VERSION}" "${SOURCE}:${VERSION}"
